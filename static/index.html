<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI文本生成图片工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(-45deg, #0c1445, #1a2980, #26d0ce, #103783);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            color: white;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: rgba(255,255,255,0.2);
            color: white;
            font-size: 16px;
        }

        textarea {
            height: 120px;
            resize: none;
        }

        button {
            width: 100%;
            padding: 15px;
            background: #26d0ce;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            background: #1a2980;
        }

        button:disabled {
            background: #666;
            cursor: not-allowed;
        }

        .result {
            margin-top: 30px;
            text-align: center;
        }

        #resultImage {
            max-width: 100%;
            border-radius: 8px;
            display: none;
        }

        .error {
            color: #ff6b6b;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI文本生成图片</h1>
        
        <div class="form-group">
            <label for="apiKey">阿里云API Key</label>
            <input type="password" id="apiKey" placeholder="请输入你的API Key">
        </div>

        <div class="form-group">
            <label for="prompt">图片描述词</label>
            <textarea id="prompt" placeholder="例如：一只可爱的橘猫，在阳光下睡觉，治愈风格"></textarea>
        </div>

        <button id="generateBtn">生成图片</button>

        <div class="error" id="errorMsg"></div>

        <div class="result">
            < img id="resultImage" alt="生成的图片">
        </div>
    </div>

    <script>
        const apiKeyInput = document.getElementById('apiKey');
        const promptInput = document.getElementById('prompt');
        const generateBtn = document.getElementById('generateBtn');
        const errorMsg = document.getElementById('errorMsg');
        const resultImage = document.getElementById('resultImage');

        generateBtn.addEventListener('click', async () => {
            const apiKey = apiKeyInput.value.trim();
            const prompt = promptInput.value.trim();

            if (!apiKey || !prompt) {
                errorMsg.textContent = '请填写API Key和描述词';
                return;
            }

            generateBtn.disabled = true;
            generateBtn.textContent = '生成中...';
            errorMsg.textContent = '';
            resultImage.style.display = 'none';

            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ apiKey, prompt })
                });

                const data = await response.json();

                if (data.code !== undefined && data.code !== 0) {
                    throw new Error(data.msg || '生成失败');
                }

                // 通义千问返回的图片URL
                const imageUrl = data.output?.results?.[0]?.url || data.output?.task_id;
                if (imageUrl) {
                    resultImage.src = imageUrl;
                    resultImage.style.display = 'block';
                } else {
                    throw new Error('未获取到图片地址');
                }
            } catch (err) {
                errorMsg.textContent = err.message;
            } finally {
                generateBtn.disabled = false;
                generateBtn.textContent = '生成图片';
            }
        });
    </script>
</body>
</html>
